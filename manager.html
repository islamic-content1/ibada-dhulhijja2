function readJSON(v,fb){try{return v?JSON.parse(v):fb}catch(e){return fb}}
function getCustomValue(g,i){var def=CUSTOM_DEFS[i];var v=(g.customSettings&&g.customSettings[i]!=null)?g.customSettings[i]:undefined;if(def&&def.type==='choice')return v==null?0:Number(v);return Number(v==null?(def?def.defaultVal:0):v)||0;}
function customLabel(g,i){var def=CUSTOM_DEFS[i];if(!def)return '';var v=getCustomValue(g,i);if(def.type==='choice'){var c=def.choices[v]||def.choices[0];return def.ibada+': '+c.label+' = '+c.pts+' نقطة';}return def.ibada+': '+v+' '+def.unit;}

  CAT_ORDER.forEach((cat,ci)=>{
    const cid='catRank_'+ci;
    html+='<button class="cat-rank-btn" onclick="togglePanel(\''+cid+'\',this)"><span>📌 '+cat+'</span><span>▼</span></button><div class="cat-rank-body" id="'+cid+'">';
    ROWS.forEach((r,ri)=>{
      if(r.cat!==cat)return;
      const ranked=girlsData.map(g=>({name:g.name,total:rowEarned(g,ri),label:rowName(g,r)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
      html+='<div class="ibada-rank"><div class="ibada-rank-title">'+esc(r.ibada)+'</div>';
      if(!ranked.length){html+='<span style="font-size:10px;color:#aaa">لا يوجد إنجاز بعد</span>';}
      ranked.forEach((x,i)=>{html+='<span class="rank-chip '+(i===0?'first':'')+'">'+(i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1)+'.')+' <b>'+esc(x.name)+'</b> <span style="color:var(--gD);font-weight:700">'+x.total+'</span></span>';});
      html+='</div>';
    });
    html+='</div>';
  });
  return html+'</div>';
}
function girlCard(g,gi,sorted,maxG){
  const pct=maxG>0?Math.round(g.grand/maxG*100):0;const rank=sorted.findIndex(s=>s.name===g.name)+1;const medal=rank<=3?['🥇','🥈','🥉'][rank-1]:'#'+rank;const dt=g.dayTotals||Array(DAYS).fill(0);
  const dots=dt.map((v,i)=>'<div class="dd '+(v>0?'f':'e')+'"><div class="dn">'+(i+1)+'</div>'+(v>0?v:'')+'</div>').join('');
  const chips=CUSTOM_DEFS.map((_,i)=>'<span class="chip">'+esc(customLabel(g,i))+'</span>').join('');
  const body=detailsTable(g)+notesHtml(g)+'<div style="font-size:10px;color:var(--mu);margin-top:8px;text-align:left">آخر إرسال: '+esc(g.lastUpdate||'—')+'</div>';
  const aml=amalHtml(g);const du=duaaHtml(g);const sy=siyamHtml(g);
  return '<div class="girl-card">'
    +'<div class="gc-hdr" style="cursor:pointer" onclick="toggleGirlCard('+gi+',this)">'
    +'<div class="gc-name">'+medal+' '+esc(g.name)+'</div>'
    +'<div style="display:flex;align-items:center;gap:8px"><div class="gc-pts">'+g.grand+' نقطة | معدل '+g.avg+'</div><span id="garr_'+gi+'" style="color:#a8e6c0;font-size:12px">▼</span></div>'
    +'</div>'
    +'<div class="gc-body" id="gbody_'+gi+'" style="display:none">'
    +'<div class="custom-box"><div class="custom-title">⚙️ اختيارات وكميات البنت</div><div class="chips">'+chips+'</div></div>'
    +'<div class="prog-row"><span>التقدم الكلي</span><span>'+pct+'%</span></div><div class="prog-t"><div class="prog-f" style="width:'+pct+'%"></div></div>'
    +'<div class="days-row">'+dots+'</div>'
    +'<button class="toggle-btn" onclick="toggleDetails('+gi+',this)"><span>عرض تفاصيل العبادات</span><span>▼</span></button>'
    +'<div class="details" id="details_'+gi+'">'+body+'</div>'
    +'<button class="section-btn" onclick="togglePanel(\'amalPanel_'+gi+'\',this)"><span>🌟 العمل الصالح</span><span>▼</span></button>'
    +'<div class="mini-panel" id="amalPanel_'+gi+'">'+aml+'</div>'
    +'<button class="section-btn" onclick="togglePanel(\'duaaPanel_'+gi+'\',this)"><span>🤲 خانة الدعاء</span><span>▼</span></button>'
    +'<div class="mini-panel" id="duaaPanel_'+gi+'">'+du+'</div>'
    +'<button class="section-btn" onclick="togglePanel(\'siyamPanel_'+gi+'\',this)"><span>🌙 الصيام وقراءة أسماء الله الحسنى</span><span>▼</span></button>'
    +'<div class="mini-panel" id="siyamPanel_'+gi+'">'+sy+'</div>'
    +'</div></div>';
}
function detailsTable(g){
  let html='<table class="detail-table"><thead><tr><th class="catH">الفئة</th><th class="ibH">العبادة</th><th class="ptsH">نقاط</th>';for(let d=1;d<=DAYS;d++)html+='<th class="dayH">'+d+'</th>';html+='<th class="ptsH">مج</th></tr></thead><tbody>';
  let lastCat='', catRows={};ROWS.forEach(r=>catRows[r.cat]=(catRows[r.cat]||0)+1);
  ROWS.forEach((r,ri)=>{const pts=rowPts(g,r);let earned=0;html+='<tr>';if(r.cat!==lastCat){html+='<td class="cat" rowspan="'+catRows[r.cat]+'">'+esc(r.cat)+'</td>';lastCat=r.cat;}html+='<td class="ibada">'+esc(rowName(g,r))+(r.badil?'<div style="font-size:7px;color:#b8860b;font-weight:400">🔄 '+esc(r.badil)+'</div>':'')+'</td><td>'+pts+'</td>';for(let d=1;d<=DAYS;d++){const v=(g.state&&g.state[sk(ri,d)])||0;if(v===1)earned+=pts;html+='<td><span class="id '+(v===1?'d':v===2?'m':'e')+'">'+(v===1?'✓':v===2?'✗':'')+'</span></td>';}html+='<td><b>'+earned+'</b></td></tr>';});
  return html+'</tbody></table>';
}
function amalHtml(g){
  const amal=g.amal||{};let count=0;Object.keys(amal).forEach(k=>{if(amal[k])count++;});
  const sorted=[...AMAL.map((a,i)=>({...a,i}))].sort((a,b)=>b.pts-a.pts);
  let html='<div class="custom-box"><div class="custom-title">تم: '+count+'/'+AMAL.length+'</div><div class="amal-list">';
  sorted.forEach(({i,pts,name})=>{
    const done=!!amal[i];const is10=pts>=10;
    html+='<span class="'+(done?'amal-ok':'amal-no')+'" style="'+(is10?'background:'+(done?'#fff8e1':'#fffdf0')+';border-color:#f0c040;':'')+'">'+(done?'✓ ':''+(is10?'🌟 ':''))+esc(name)+' — '+pts+'</span>';
  });
  return html+'</div></div>';
}
function duaaHtml(g){
  const duaa=g.duaa||{};let count=0;Object.keys(duaa).forEach(k=>{if(duaa[k])count++;});let html='<div class="custom-box"><div class="custom-title">تم: '+count+'/30</div>';
  for(let d=1;d<=DAYS;d++){let any=DUAA_ITEMS.some(it=>duaa[d+'-'+it.key]);if(!any)continue;html+='<div class="duaa-day"><div class="duaa-title">اليوم '+d+'</div><div class="duaa-text">'+esc(DUAAS[d-1]||'')+'</div><div class="duaa-list">';DUAA_ITEMS.forEach(it=>{html+='<span class="'+(duaa[d+'-'+it.key]?'amal-ok':'amal-no')+'">'+(duaa[d+'-'+it.key]?'✓ ':'')+esc(it.name)+' — ٢</span>';});html+='</div></div>';}
  if(count===0)html+='<div style="font-size:10px;color:#aaa">لا يوجد دعاء محدد بعد</div>';
  return html+'</div>';
}
function siyamHtml(g){
  const data=g.siyam||{};let earned=0;for(let d=1;d<=9;d++)if(data['siyam-'+d]||data['read-'+d])earned++;
  let html='<div class="custom-box"><div class="custom-title">🌙 الصيام / القراءة: '+earned+'/9 يوم ('+earned*10+' نقطة)</div>';
  for(let d=1;d<=9;d++){
    const fasted=!!data['siyam-'+d];const read=!!data['read-'+d];const note=data['readNote-'+d]||'';
    if(!fasted&&!read&&!note)continue;
    html+='<div class="duaa-day"><div class="duaa-title">اليوم '+d;
    if(fasted) html+=' <span style="background:#d4f4e2;color:#1a6b3c;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700">🌙 صائمة</span>';
    else if(read) html+=' <span style="background:#e8f4fd;color:#1a4a8a;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700">📖 قرأت</span>';
    html+='</div>';
    if(note) html+='<div class="duaa-text" style="background:#fffdf0;border:1px solid #f0c040;border-radius:6px;padding:5px 8px;margin-top:4px">✍️ '+esc(note)+'</div>';
    html+='</div>';
  }
  if(earned===0) html+='<div style="font-size:10px;color:#aaa">لا يوجد بيانات بعد</div>';
  return html+'</div>';
}
function notesHtml(g){
  const notes=g.notes||{};const keys=Object.keys(notes);if(!keys.length)return '';
  let html='<div class="custom-box" style="margin-top:10px"><div class="custom-title">📝 ملاحظات الأيام</div>';
  keys.sort((a,b)=>Number(a)-Number(b)).forEach(d=>{html+='<div class="duaa-day"><div class="duaa-title">اليوم '+d+'</div><div class="duaa-text">'+esc(notes[d].text||'')+'</div><div style="font-size:9px;color:#aaa">'+esc(notes[d].time||'')+'</div></div>';});
  return html+'</div>';
}
function toggleGirlCard(i,hdr){const b=document.getElementById('gbody_'+i);const arr=document.getElementById('garr_'+i);const open=b.style.display==='block';b.style.display=open?'none':'block';if(arr)arr.textContent=open?'▼':'▲';}
function toggleDetails(i,btn){const d=document.getElementById('details_'+i);d.classList.toggle('open');const s=btn.querySelector('span:last-child');if(s)s.textContent=d.classList.contains('open')?'▲':'▼';}
function togglePanel(id,btn){const d=document.getElementById(id);if(!d)return;d.classList.toggle('open');if(!d.classList.contains('open')&&d.style.display==='block')d.style.display='none'; if(d.classList.contains('open'))d.style.display='block';const s=btn.querySelector('span:last-child');if(s)s.textContent=(d.classList.contains('open')||d.style.display==='block')?'▲':'▼';}
function exportExcel(){
  if(!girlsData.length){showToast('لا يوجد بيانات');return;}
  const wb=XLSX.utils.book_new();const sorted=[...girlsData].sort((a,b)=>b.grand-a.grand);
  const sum=[['الترتيب','الاسم','المجموع','المعدل','الأيام',...Array.from({length:DAYS},(_,i)=>'يوم '+(i+1)),'الكميات والاختيارات','آخر تحديث']];
  sorted.forEach((g,i)=>sum.push([i+1,g.name,g.grand,g.avg,g.filled,...(g.dayTotals||[]),CUSTOM_DEFS.map((_,j)=>customLabel(g,j)).join(' | '),g.lastUpdate||'']));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(sum),'ملخص');
  girlsData.forEach(g=>{const d=[['الفئة','العبادة','النقاط',...Array.from({length:DAYS},(_,i)=>'يوم '+(i+1)),'المجموع']];ROWS.forEach((r,ri)=>{const pts=rowPts(g,r);let s=0;const row=[r.cat,rowName(g,r),pts];for(let day=1;day<=DAYS;day++){const v=((g.state||{})[sk(ri,day)]||0)===1?pts:0;row.push(v);s+=v;}row.push(s);d.push(row);});XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(d),String(g.name).slice(0,28));});
  XLSX.writeFile(wb,'نتائج_البنات_٩_ذي_الحجة.xlsx');showToast('تم التصدير ✓');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
loadData();
</script>
